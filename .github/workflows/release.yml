name: Release Builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lbc-miner.exe
            archive: lbc-miner-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: lbc-miner
            archive: lbc-miner-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux OpenCL loader
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Build release binary
        run: cargo build --release --features opencl,hip --target ${{ matrix.target }}

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $packageName = "lbc-miner-${{ matrix.name }}"
          $stage = "dist/$packageName"
          New-Item -ItemType Directory -Force -Path "$stage/configs" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$stage/"
          Copy-Item "README.md", "LICENSE", "NOTICE.md" "$stage/"
          Copy-Item "configs/lbrypool.json" "$stage/configs/"
          Compress-Archive -Path "$stage/*" -DestinationPath "dist/${{ matrix.archive }}" -Force

      - name: Package Linux binary
        if: runner.os == 'Linux'
        shell: bash
        run: |
          package_name="lbc-miner-${{ matrix.name }}"
          stage="dist/$package_name"
          mkdir -p "$stage/configs"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$stage/"
          cp README.md LICENSE NOTICE.md "$stage/"
          cp configs/lbrypool.json "$stage/configs/"
          tar -czf "dist/${{ matrix.archive }}" -C dist "$package_name"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Attach artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
