name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux OpenCL loader
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ocl-icd-opencl-dev

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run tests
        run: cargo test --features opencl,hip
